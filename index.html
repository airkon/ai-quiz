<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f0a35e" />
<title>The Kaki Trek</title>
<style>
  /* ============================================================
     THE KAKI TREK — visual style
     Tropical / warm / playful: jungle greens, sandy tones, sunset.
     All layout & animation lives here; all COPY lives in the JS
     DATA object further down. Edit text there, not here.
     ============================================================ */
  :root{
    --jungle-deep:#123a2b;
    --jungle:#1c6b47;
    --jungle-mid:#2e8b5c;
    --leaf:#57b17d;
    --sand:#f6e7c6;
    --sand-deep:#ecd6a6;
    --cream:#fffaf0;
    --sunset:#ff8a5c;
    --sunset-deep:#f4693b;
    --coral:#ff6f61;
    --gold:#f4b24a;
    --ink:#2a2018;
    --ink-soft:#6b5d4d;
    --card:#fffdf7;
    --shadow:0 10px 30px rgba(40,25,10,.18);
    --radius:22px;
    --radius-sm:16px;
    --ease:cubic-bezier(.22,.61,.36,1);
    /* pixel-lean UI: chunky dark edges + hard (blur-less) offset shadows */
    --edge:#33251a;
    --sunset-edge:#bd4720;
    --leaf-edge:#2c7a4f;
    --mono:"Courier New",ui-monospace,"SF Mono",Menlo,monospace;
    --logo-font:"Impact","Haettenschweiler","Arial Narrow Bold","Arial Black",sans-serif;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Trebuchet MS","Segoe UI",Verdana,system-ui,sans-serif;
    color:var(--ink);
    font-size:16px;
    line-height:1.5;
    /* pleasant sunset backdrop outside the phone column */
    background:
      radial-gradient(120% 80% at 50% -10%, #ffd28a 0%, #ff9e6b 32%, #f4693b 62%, #7a3b8f 100%) fixed;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:stretch;
  }

  /* Phone-width app column */
  #app{
    width:100%;
    max-width:430px;
    min-height:100dvh;
    background:linear-gradient(180deg,#fffdf7 0%,#fff6e3 100%);
    position:relative;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  @media (min-width:520px){
    body{padding:24px;}
    #app{min-height:min(880px,calc(100dvh - 48px));border-radius:30px;}
  }

  /* Portrait-only: on landscape phones, hide the app and ask to rotate.
     Gated on a short height so desktop/tablet landscape is unaffected. */
  #rotate{display:none;}
  @media (orientation:landscape) and (max-height:600px){
    #app{display:none;}
    #rotate{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      position:fixed;inset:0;z-index:100;text-align:center;padding:24px;color:#fff;
      background:radial-gradient(120% 90% at 50% -10%, #ffd28a 0%, #ff9e6b 32%, #f4693b 62%, #7a3b8f 100%);
    }
  }
  .rotate-icon{font-size:56px;animation:rotatehint 2.4s ease-in-out infinite;}
  @keyframes rotatehint{0%,55%,100%{transform:rotate(0);}25%,40%{transform:rotate(-90deg);}}
  body.rm .rotate-icon{animation:none;}
  .rotate-title{font-size:22px;font-weight:bold;margin-top:16px;text-shadow:2px 2px 0 rgba(51,37,26,.35);}
  .rotate-sub{font-family:var(--mono);font-size:14px;margin-top:8px;opacity:.92;letter-spacing:.03em;}

  /* Stage holds the sliding screens */
  #stage{position:relative;flex:1;overflow:hidden;}
  .screen{
    position:absolute;inset:0;
    overflow:hidden;
    transition:transform .35s var(--ease), opacity .35s var(--ease);
    will-change:transform,opacity;
  }
  /* Full-bleed background layer (edge-to-edge illustration) + soft bottom
     scrim that grounds the floating card against a busy image. */
  .screen-bg{position:absolute;inset:0;z-index:0;overflow:hidden;}
  .scrim{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(to bottom,rgba(0,0,0,0) 42%,rgba(30,15,5,.20) 100%);}
  /* Faint shared background used behind question + tally content. */
  .bg-faint{position:absolute;inset:0;z-index:0;overflow:hidden;}
  .bg-faint .illo{opacity:.28;}
  .bg-faint::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,253,247,.70),rgba(255,246,227,.82));}
  .pos-center{transform:translateX(0);opacity:1;}
  .pos-right{transform:translateX(100%);opacity:1;}
  .pos-left{transform:translateX(-100%);opacity:1;}
  /* reduced-motion: opacity-only cross-fade */
  body.rm .screen{transition:opacity .28s ease;transform:none!important;}
  body.rm .pos-right,body.rm .pos-left{opacity:0;}

  /* ---------- Illustration placeholders ---------- */
  /* Each is ONE element you can later swap for <img src=...>. */
  .illo{
    border:2px dashed var(--jungle-mid);
    background:repeating-linear-gradient(135deg,rgba(87,177,125,.10) 0 14px,rgba(246,231,198,.35) 14px 28px);
    border-radius:var(--radius-sm);
    display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--jungle);
    font-size:13px;font-weight:bold;
    padding:14px;
    line-height:1.35;
    overflow:hidden;
  }
  .illo .illo-id{display:block;font-size:11px;color:var(--sunset-deep);letter-spacing:.04em;margin-bottom:4px;text-transform:uppercase;}
  /* When a real image is supplied, the box becomes the image (no border/tint). */
  .illo.has-img{border:none;padding:0;background:none;}
  .illo.has-img img{width:100%;height:100%;object-fit:cover;display:block;}
  .illo-4x3{width:100%;aspect-ratio:4/3;}
  .illo-1x1{width:60%;aspect-ratio:1/1;margin:0 auto;}
  /* full-bleed background placeholder — fills the whole screen */
  .illo-bleed{width:100%;height:100%;border-radius:0;}

  /* Slow Ken Burns idle drift for full-bleed backgrounds. It only ever
     scales UP, so it never reveals a screen edge. Transform-only, 60fps. */
  .kenburns{animation:kenburns 16s ease-in-out infinite alternate;transform-origin:50% 38%;}
  @keyframes kenburns{from{transform:scale(1.05);}to{transform:scale(1.14) translateY(-1.5%);}}
  body.rm .kenburns{animation:none;transform:none;}

  /* ---------- Typography & shared bits ---------- */
  h1{font-size:33px;line-height:1.05;margin:0 0 8px;color:var(--jungle-deep);
    letter-spacing:.01em;text-shadow:2px 2px 0 rgba(51,37,26,.22);}
  h2{font-size:23px;line-height:1.2;margin:0 0 10px;color:var(--jungle-deep);}
  p{margin:0 0 14px;}
  .subtitle{font-size:17px;color:var(--ink-soft);}
  /* HUD-style labels use the mono stack for a game-console feel */
  .chapter{
    font-family:var(--mono);
    font-size:12.5px;font-weight:bold;letter-spacing:.08em;text-transform:uppercase;
    color:var(--sunset-deep);margin-bottom:6px;
  }
  .muted{color:var(--ink-soft);font-size:13.5px;font-family:var(--mono);letter-spacing:.04em;}
  .tiny{font-size:12.5px;color:var(--ink-soft);line-height:1.5;}
  .grow{flex:1;}
  .center{text-align:center;}

  /* Buttons */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    width:100%;cursor:pointer;
    background:var(--sunset-deep);
    color:#fff;font-size:17px;font-weight:bold;font-family:inherit;
    text-transform:uppercase;letter-spacing:.06em;
    padding:14px 20px;border:3px solid var(--edge);border-radius:10px;
    box-shadow:0 6px 0 var(--sunset-edge);
    transition:transform .07s steps(2),box-shadow .07s steps(2);
  }
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--sunset-edge);}
  .btn.secondary{
    background:var(--leaf);color:#0f2f20;border-color:var(--edge);
    box-shadow:0 6px 0 var(--leaf-edge);
  }
  .btn.secondary:active{transform:translateY(4px);box-shadow:0 2px 0 var(--leaf-edge);}
  .link{
    background:none;border:none;cursor:pointer;font-family:var(--mono);
    color:var(--ink-soft);font-size:13.5px;text-decoration:underline;letter-spacing:.03em;
    padding:8px;margin-top:6px;
  }

  /* Hero screens (landing + story): full-bleed background with a floating
     card of content pinned near the bottom. Buttons live INSIDE the card.
     margin-top:auto floats the card down when content is short, and lets it
     scroll from the top when content is tall (avoids justify-end clipping). */
  .hero-content{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:20px 16px calc(22px + env(safe-area-inset-bottom));}
  .floatcard{margin-top:auto;background:var(--card);border:3px solid var(--edge);
    border-radius:14px;padding:22px 20px;box-shadow:6px 6px 0 rgba(51,37,26,.85);}
  /* back arrow floating over a hero background (story screens) */
  .top-back{position:absolute;top:calc(16px + env(safe-area-inset-top));left:16px;z-index:3;}
  .floatcard h1{margin:0 0 8px;}
  .floatcard .subtitle{margin:0;}
  .floatcard .btn{margin-top:18px;}
  .story-copy{font-size:18px;line-height:1.55;margin:0;}
  .landing-blurb{font-size:16px;line-height:1.55;color:var(--ink);margin:0;}

  /* Floating Jumanji-style title logo (landing): gold->red 3D extruded text */
  .title-logo{width:100%;max-width:330px;margin:2vh auto 0;
    filter:drop-shadow(0 8px 10px rgba(20,10,0,.4));}
  .title-logo svg{width:100%;height:auto;display:block;overflow:visible;
    animation:logofloat 4.5s ease-in-out infinite alternate;}
  body.rm .title-logo svg{animation:none;}
  @keyframes logofloat{from{transform:translateY(-4px);}to{transform:translateY(5px);}}
  .lg-top,.lg-main,.lg-sub{font-family:var(--logo-font);font-weight:900;}
  .lg-top{font-size:46px;letter-spacing:2px;}
  .lg-main{font-size:104px;letter-spacing:3px;}
  .lg-ext{fill:#3a1806;}
  .lg-face{fill:url(#kakigold);stroke:#2a1206;stroke-width:2px;paint-order:stroke;stroke-linejoin:round;}
  .lg-sub{font-size:22px;letter-spacing:4px;fill:url(#kakigold);stroke:#2a1206;stroke-width:1.2px;paint-order:stroke;stroke-linejoin:round;}

  .rise{opacity:0;animation:rise .5s var(--ease) forwards;}
  @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  body.rm .rise{animation:fadein .35s ease forwards;}
  @keyframes fadein{from{opacity:0;}to{opacity:1;}}

  /* ---------- Question screen ---------- */
  /* Faint shared jungle bg behind; padded content scrolls on top; the option
     cards act as the floating content. */
  .q-content{position:absolute;inset:0;z-index:1;overflow-y:auto;
    -webkit-overflow-scrolling:touch;padding:22px 20px 26px;}
  /* 3-column grid keeps the dots centred on screen: the empty right column
     mirrors the back-arrow width so the middle (dots) column stays centred. */
  .qtop{display:grid;grid-template-columns:42px 1fr 42px;align-items:center;gap:10px;margin-bottom:14px;}
  .backarrow{
    flex:0 0 auto;width:42px;height:42px;border-radius:10px;
    border:3px solid var(--edge);background:var(--sand);color:var(--jungle-deep);
    font-size:20px;cursor:pointer;font-family:inherit;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 0 var(--sand-deep);
    transition:transform .07s steps(2),box-shadow .07s steps(2);
  }
  .backarrow:active{transform:translateY(3px);box-shadow:0 1px 0 var(--sand-deep);}
  .backarrow[hidden]{visibility:hidden;}
  .dots{display:flex;gap:7px;flex:1;justify-content:center;flex-wrap:wrap;}
  .dot{
    width:11px;height:11px;border-radius:2px;background:var(--sand);
    border:2px solid var(--edge);
    transition:transform .2s steps(2),background .2s;
  }
  .dot.done{background:var(--leaf);}
  .dot.active{background:var(--sunset-deep);transform:scale(1.4);animation:pulse 1.2s steps(3) infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(244,105,59,.5);}50%{box-shadow:0 0 0 5px rgba(244,105,59,0);}}
  body.rm .dot.active{animation:none;}

  .scenario{font-size:18px;line-height:1.5;margin:2px 0 18px;color:var(--jungle-deep);}
  .options{display:flex;flex-direction:column;gap:12px;}
  .opt{
    text-align:left;font-family:inherit;font-size:16px;line-height:1.45;
    background:var(--card);border:3px solid var(--edge);
    border-radius:10px;padding:14px 15px;cursor:pointer;color:var(--ink);
    position:relative;
    box-shadow:4px 4px 0 rgba(51,37,26,.55);
    transition:transform .08s steps(2),border-color .15s,
               opacity .25s var(--ease),background .15s,box-shadow .08s steps(2);
    /* cascade-in */
    opacity:0;animation:cascade .4s var(--ease) forwards;
  }
  @keyframes cascade{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  body.rm .opt{animation:fadein .3s ease forwards;}
  .opt:active{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(51,37,26,.55);}
  .opt.selected{
    border-color:var(--sunset-deep);background:#fff3e6;
    box-shadow:4px 4px 0 var(--sunset-edge);
  }
  .opt.pressed{transform:translate(2px,2px);}
  .opt.dimmed{opacity:.4;}

  /* ---------- Tallying screen ---------- */
  .tally-content{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;
    justify-content:center;align-items:center;text-align:center;gap:20px;padding:24px;}
  .tally-svg{width:100%;max-width:320px;}
  .trail-guide{fill:none;stroke:var(--sand-deep);stroke-width:5;stroke-linecap:butt;stroke-dasharray:2 13;}
  .trail-draw{fill:none;stroke:var(--sunset-deep);stroke-width:5;stroke-linecap:butt;}
  .walker{fill:var(--jungle);stroke:#fff;stroke-width:2;}
  .tally-text{font-family:var(--mono);font-size:17px;font-weight:bold;letter-spacing:.04em;color:var(--jungle-deep);}

  /* ---------- Results ---------- */
  /* Full-bleed persona portrait (subject up top); a floating card sits over
     the faded lower area and scrolls. "Walk again" lives at the card's end. */
  .results-scroll{position:absolute;inset:0;z-index:2;overflow-y:auto;-webkit-overflow-scrolling:touch;
    display:flex;flex-direction:column;}
  .results-spacer{flex:0 0 auto;height:46dvh;}
  .results-card{flex:0 0 auto;
    margin:0 16px calc(22px + env(safe-area-inset-bottom));
    background:var(--card);border:3px solid var(--edge);border-radius:14px;padding:24px 20px;
    box-shadow:6px 6px 0 rgba(51,37,26,.8);}
  .persona-name{font-size:29px;line-height:1.05;margin:4px 0 6px;color:var(--jungle-deep);text-align:center;
    letter-spacing:.01em;text-shadow:2px 2px 0 rgba(51,37,26,.22);
    opacity:0;animation:stamp .5s var(--ease) .35s forwards;}
  @keyframes stamp{0%{opacity:0;transform:scale(1.35);}60%{opacity:1;transform:scale(.96);}100%{opacity:1;transform:scale(1);}}
  body.rm .persona-name{animation:fadein .4s ease .3s forwards;}
  .persona-desc{font-size:16px;text-align:center;color:var(--ink);margin-bottom:14px;}
  .card-reveal{opacity:0;animation:reveal .6s cubic-bezier(.34,1.56,.64,1) forwards;}
  @keyframes reveal{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
  body.rm .card-reveal{animation:fadein .4s ease forwards;}
  .aisa{
    background:var(--sand);border:3px solid var(--edge);border-radius:10px;padding:13px 15px;
    font-size:15px;color:var(--ink);margin:6px 0 16px;box-shadow:4px 4px 0 rgba(51,37,26,.4);
  }
  .tipbox{
    background:linear-gradient(180deg,#eafaf0,#dff3e6);
    border:3px solid var(--leaf-edge);border-radius:10px;
    padding:14px 16px;margin-bottom:14px;box-shadow:4px 4px 0 rgba(44,122,79,.45);
  }
  .tipbox h3{margin:0 0 8px;font-family:var(--mono);font-size:13.5px;color:var(--jungle-deep);text-transform:uppercase;letter-spacing:.07em;}
  .tipbox .tip{font-size:15px;margin:0 0 10px;}
  .tipbox .tip:last-child{margin-bottom:0;}
  .tip .tip-dim{font-weight:bold;color:var(--jungle);}
  .fineprint{margin:8px 0 18px;}
  .fineprint p{margin-bottom:8px;}

  /* Confetti / leaf-fall */
  #confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:5;}
  .leaf{position:absolute;top:-24px;width:12px;height:12px;border-radius:2px;border:2px solid rgba(51,37,26,.5);will-change:transform,opacity;}
  @keyframes fall{
    0%{transform:translateY(-24px) rotate(0);opacity:1;}
    100%{transform:translateY(115vh) rotate(540deg);opacity:0;}
  }
</style>
</head>
<body>
  <div id="app">
    <div id="stage"></div>
    <div id="confetti" aria-hidden="true"></div>
  </div>

  <!-- Shown only on landscape phones; the trek is designed portrait-only. -->
  <div id="rotate">
    <div class="rotate-icon">📱</div>
    <div class="rotate-title">Turn your phone upright</div>
    <div class="rotate-sub">The Kaki Trek walks best in portrait.</div>
  </div>

<script>
/* ================================================================
   ALL EDITABLE CONTENT LIVES IN THIS ONE OBJECT.
   Change copy, questions, options, scores, personas and tips here
   without touching the app logic below it.

   - Each question is shown as TWO screens: a scene-setter (per-chapter
     `illo` + `scene` text), then the `prompt` with its 4 `options`.
     Each question also belongs to a `dimension`.
   - Each option has `text` and a `score` (1–4). Scores are tied to
     the option's content, not its on-screen position (order is
     randomized each playthrough).
   ================================================================ */
const DATA = {

  landing:{
    // To use a real image, add `src`. Remove it to fall back to the placeholder.
    illo:{ id:"ill-landing", desc:"island scene / trek title art", src:"assets/ill-landing.webp" },
    // Floating title logo — rendered as a Jumanji-style SVG over the background.
    logoTop:"TREK WITH",
    logoMain:"KAKI",
    logoSub:"AN ISLAND ADVENTURE",
    // Card blurb: what the quiz actually is.
    body:"A quick, playful check of how you and AI work together. Eight island scenarios, about three minutes — no wrong answers, just a sense of where you're at and one idea to grow.",
    button:"Start"
  },

  // Three story beats before the questions.
  story:[
    {
      illo:{ id:"ill-story-boat", desc:"bumboat arriving at jetty", src:"assets/ill-story-boat.webp" },
      copy:"The bumboat drops you off at the jetty of Pulau Senja, a little island of jungle, mangrove, and one very tall hill. You have eight days to cross the island and reach the top."
    },
    {
      illo:{ id:"ill-story-pack", desc:"backpack with kaya toast, paper map, Kaki gadget", src:"assets/ill-story-pack.webp" },
      copy:"Inside your pack: some kaya toast for the road, a trusty paper map, and one piece of new equipment called Kaki, an AI-powered trail gadget. (And yes, it's a machine, not a friend. The name just stuck.)"
    },
    {
      illo:{ id:"ill-story-kaki", desc:"the Kaki gadget scanning a route", src:"assets/ill-story-kaki.webp" },
      copy:"Kaki can scan routes, draft plans, and flag trouble ahead. How much you rely on it is entirely up to you. There are no wrong answers, so just pick what you would actually do. The boat isn't coming back. Walk lor!",
      sub:"8 quick scenarios · about 3 minutes"
    }
  ],

  // 8 questions. Dimensions pair up: Delegation Q1-2, Description Q3-4,
  // Discernment Q5-6, Diligence Q7-8.
  questions:[
    {
      chapter:"Chapter 1 — The jetty",
      dimension:"Delegation",
      illo:{ id:"ill-ch1", desc:"day one at the jetty, choosing a route" },
      scene:"It's day one, and you need a route across the island. Kaki's route-scan can chart a path in seconds.",
      prompt:"How do you plan today's route?",
      options:[
        { text:"You run the scan and follow whatever route it draws. Kaki probably knows best, so you just start walking.", score:1 },
        { text:"You stick to your paper map, like you always do. The scan is probably useful, but you've never actually tried it out.", score:2 },
        { text:"You run the scan for the main path, but a few stretches look a bit dodgy to you, so you plan those parts yourself based on gut feel.", score:3 },
        { text:"You let the scan handle the flat, straightforward stretches, but plan the steep hill climb yourself. You've learnt what Kaki is good at, and steep ground isn't it.", score:4 }
      ]
    },
    {
      chapter:"Chapter 2 — The mangrove crossing",
      dimension:"Delegation",
      illo:{ id:"ill-ch2", desc:"a wide mangrove channel blocking the way" },
      scene:"A wide mangrove channel blocks the way, too deep to wade across. Kaki can generate a step-by-step plan for building a raft from what's around you.",
      prompt:"What do you do?",
      options:[
        { text:"You follow Kaki's build plan step by step, lash everything together exactly as described, and push off straight away. The plan looked confident, and Kaki has been right before.", score:1 },
        { text:"You skip the plan completely and build the raft by hand, the way you learnt in NS. Machines don't know rafts.", score:2 },
        { text:"You follow Kaki's plan as written, then test the finished raft in the shallows yourself before anyone climbs on.", score:3 },
        { text:"You adjust the plan to fit the gear your team actually brought, then test it in the shallows first.", score:4 }
      ]
    },
    {
      chapter:"Chapter 3 — Making camp",
      dimension:"Description",
      illo:{ id:"ill-ch3", desc:"sun setting, time to make camp" },
      scene:"The sun is setting and you need Kaki to find tonight's campsite.",
      prompt:"What do you type into it?",
      options:[
        { text:"Please find me a really nice spot to camp tonight, somewhere good, you know what I mean, thanks!", score:1 },
        { text:"Find a campsite somewhere near the trail.", score:2 },
        { text:"Find a flat campsite near fresh water.", score:3 },
        { text:"Find a flat campsite near fresh water, sheltered from wind. We have two tents.", score:4 }
      ]
    },
    {
      chapter:"Chapter 4 — Rocky ground",
      dimension:"Description",
      illo:{ id:"ill-ch4", desc:"a campsite too rocky to pitch a tent" },
      scene:"You hike to Kaki's recommended campsite, but the ground turns out far too rocky to pitch a tent.",
      prompt:"What do you do?",
      options:[
        { text:"You pitch the tent there anyway and spend the night rolling around on rocks. Kaki chose this spot, so it must be the best one available.", score:1 },
        { text:"You ask Kaki to find another spot, and keep asking until one works out.", score:2 },
        { text:"You ask Kaki for a few other options and pick whichever looks most promising to you.", score:3 },
        { text:"You tell Kaki the ground here was too rocky so it knows what to avoid, then ask again.", score:4 }
      ]
    },
    {
      chapter:"Chapter 5 — The jungle fruit",
      dimension:"Discernment",
      illo:{ id:"ill-ch5", desc:"a cluster of unfamiliar jungle fruit" },
      scene:"Deep in the forest, Kaki scans a cluster of unfamiliar fruit and reports that they're safe to eat.",
      prompt:"What do you do?",
      options:[
        { text:"You eat them straight away. Kaki scanned them and said safe, so that settles it.", score:1 },

/* ================================================================
   APP LOGIC — no copy below this line.
   ================================================================ */
const RM = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
if(RM) document.body.classList.add("rm");

const stage = document.getElementById("stage");

const state = {
  qIndex:0,
  answers:[],   // score per question (1–4), or null
  order:[],     // per-question shuffled option arrays
  busy:false
};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Fresh run: reset answers and re-randomize option order.
function buildRun(){
  state.qIndex = 0;
  state.answers = new Array(DATA.questions.length).fill(null);
  state.order = DATA.questions.map(q => shuffle(q.options));
}

// Slide a new screen in. dir: 'fwd' (default) or 'back'.
function transitionTo(node, dir){
  if(state.busy) return;
  node.classList.add("screen");
  const old = stage.querySelector(".screen");

  if(!old){
    node.classList.add("pos-center");
    stage.appendChild(node);
    return;
  }

  state.busy = true;
  const incomingStart = dir === "back" ? "pos-left" : "pos-right";
  const outgoingEnd   = dir === "back" ? "pos-right" : "pos-left";

  node.classList.add(incomingStart);
  stage.appendChild(node);

  // force reflow so the start position is committed before we animate
  void node.offsetWidth;

  // Move to center. Driven by rAF, but a timer fallback guarantees the
  // screen settles even if rAF is throttled (backgrounded/hidden tab).
  let moved = false;
  const move = ()=>{
    if(moved) return;
    moved = true;
    node.classList.remove(incomingStart);
    node.classList.add("pos-center");
    old.classList.remove("pos-center");
    old.classList.add(outgoingEnd);
  };
  requestAnimationFrame(()=> requestAnimationFrame(move));
  setTimeout(move, 60);

  // Clean up the outgoing screen once the slide ends (with timer fallback).
  let cleaned = false;
  const done = ()=>{
    if(cleaned) return;
    cleaned = true;
    old.remove();
    state.busy = false;
  };
  old.addEventListener("transitionend", done, {once:true});
  setTimeout(done, 700);
}

// ---- Illustration builder ----
// If the illo has a `src`, render the real image; otherwise render the
// labelled dashed placeholder. A broken/missing image falls back to the
// placeholder so a wrong path never leaves a blank screen.
function makeIllo(illo, shape, extraClass){
  const d = document.createElement("div");
  d.className = "illo illo-" + shape + (extraClass ? " " + extraClass : "");
  const placeholder = ()=>{
    d.classList.remove("has-img");
    d.innerHTML = '<span><span class="illo-id">'+illo.id+'</span>'+illo.desc+'</span>';
  };
  if(illo.src){
    d.classList.add("has-img");
    const img = document.createElement("img");
    img.alt = illo.desc || "";
    img.onerror = placeholder;
    img.src = illo.src;
    d.appendChild(img);
  } else {
    placeholder();
  }
  return d;
}

// ---- Floating Jumanji-style title logo (inline SVG) ----
function makeTitleLogo(){
  const L = DATA.landing;
  // stacked offset copies form the 3D extrusion (drawn back-to-front)
  const ext = (id,n)=>{ let s=""; for(let i=n;i>=1;i--){ s+='<use href="#'+id+'" x="'+(i*0.9).toFixed(1)+'" y="'+(i*0.9).toFixed(1)+'"/>'; } return s; };
  const wrap = document.createElement("div");
  wrap.className = "title-logo rise";
  wrap.innerHTML =
    '<svg viewBox="0 0 400 205" role="img" aria-label="'+L.logoTop+' '+L.logoMain+' — '+L.logoSub+'">'
    + '<defs>'
    + '<linearGradient id="kakigold" x1="0" y1="0" x2="0" y2="1">'
    +   '<stop offset="0" stop-color="#ffe89a"/><stop offset=".32" stop-color="#f6b93b"/>'
    +   '<stop offset=".64" stop-color="#ea6a1e"/><stop offset="1" stop-color="#a81f16"/>'
    + '</linearGradient>'
    + '<text id="lgtop" x="200" y="50" text-anchor="middle" class="lg-top">'+L.logoTop+'</text>'
    + '<text id="lgmain" x="200" y="148" text-anchor="middle" class="lg-main">'+L.logoMain+'</text>'
    + '</defs>'
    + '<g class="lg-ext">'+ext('lgtop',7)+ext('lgmain',10)+'</g>'
    + '<use href="#lgtop" class="lg-face"/>'
    + '<use href="#lgmain" class="lg-face"/>'
    + '<text x="200" y="188" text-anchor="middle" class="lg-sub">'+L.logoSub+'</text>'
    + '</svg>';
  return wrap;
}

// ---- Screen: Chapter scene-setter (illustration + scene text) ----
function renderScene(i, dir){

  // Back arrow: to the previous chapter's question, or the last story beat.
  const back = document.createElement("button");
  back.className = "backarrow top-back";
  back.setAttribute("aria-label","Go back");
  back.innerHTML = "&#8592;";
  back.onclick = ()=>{
    if(i > 0) renderQuestion(i-1,"back");
    else renderStory(DATA.story.length-1,"back");
  };

  const content = document.createElement("div");
  content.className = "hero-content";
  const card = document.createElement("div");
  card.className = "floatcard";

  chap.textContent = q.chapter;

  scene.style.animationDelay = "0.06s";
  scene.textContent = q.scene;

  card.append(chap, scene, btn);
  content.append(card);
  s.append(bg, scrim, back, content);

// ---- Screen: Question (prompt + options, with a faint scene recap) ----
function renderQuestion(i, dir){
  state.qIndex = i;
  const q = DATA.questions[i];
  const opts = state.order[i];
  const s = document.createElement("div");

  const bg = document.createElement("div");
  bg.className = "bg-faint";
  bg.append(makeIllo(DATA.questionBg, "bleed"));

  const content = document.createElement("div");
  content.className = "q-content";

  // top row: back arrow + progress dots
  const top = document.createElement("div");
  top.className = "qtop";
  const back = document.createElement("button");
  back.className = "backarrow";
  back.setAttribute("aria-label","Go back");
  back.innerHTML = "&#8592;";
  back.onclick = ()=> renderScene(i,"back");
  const dots = document.createElement("div");
  dots.className = "dots";
  for(let d=0; d<DATA.questions.length; d++){
    const dot = document.createElement("span");
    dot.className = "dot";
    if(d < i) dot.classList.add("done");
    if(d === i) dot.classList.add("active");
    dots.append(dot);
  }
  top.append(back, dots);
  content.append(top);

  const prompt = document.createElement("p");
  prompt.className = "scenario";
  prompt.textContent = q.prompt;
  content.append(prompt);

  const list = document.createElement("div");
  list.className = "options";
  const cards = [];
  opts.forEach((opt, idx)=>{
    const c = document.createElement("button");
    c.className = "opt";
    c.style.animationDelay = (idx*0.07) + "s";
    const txt = document.createElement("span");
    txt.textContent = opt.text;
    c.append(txt);
    // reflect a previously chosen answer (so back-arrow shows the pick)
    if(state.answers[i] === opt.score) c.classList.add("selected");
    c.onclick = ()=> selectOption(c, opt, cards, i);
    cards.push(c);
    list.append(c);
  });
  content.append(list);

  s.append(bg, content);
  transitionTo(s, dir || "fwd");
}

function selectOption(card, opt, cards, i){
  if(state.busy) return;
  state.answers[i] = opt.score;

  cards.forEach(c=> c.classList.remove("selected"));
  card.classList.add("pressed");
  card.classList.add("selected");
  cards.forEach(c=>{ if(c!==card) c.classList.add("dimmed"); });
  card.addEventListener("animationend",()=>card.classList.remove("pressed"),{once:true});
  setTimeout(()=> card.classList.remove("pressed"), 160);

  // ~400ms highlight, then auto-advance
  setTimeout(()=>{
    if(i < DATA.questions.length - 1) renderScene(i+1,"fwd");
    else renderTally();
  }, 420);
}

// ---- Screen: Tallying interstitial ----
function renderTally(){
  const s = document.createElement("div");

  const bg = document.createElement("div");
  bg.className = "bg-faint";
  bg.append(makeIllo(DATA.questionBg, "bleed"));

  const content = document.createElement("div");
  content.className = "tally-content";

  const D = "M20 96 C 70 30, 120 30, 160 74 S 250 104, 300 44";
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns,"svg");
  svg.setAttribute("viewBox","0 0 320 130");
  svg.setAttribute("class","tally-svg");

  const guide = document.createElementNS(ns,"path");
  guide.setAttribute("d",D);
  guide.setAttribute("class","trail-guide");

  const draw = document.createElementNS(ns,"path");
  draw.setAttribute("d",D);
  draw.setAttribute("class","trail-draw");

  const walker = document.createElementNS(ns,"rect");
  walker.setAttribute("width","13");
  walker.setAttribute("height","13");
  walker.setAttribute("rx","1");
  walker.setAttribute("class","walker");
  const setWalker = (x,y)=>{ walker.setAttribute("x", x-6.5); walker.setAttribute("y", y-6.5); };

  svg.append(guide, draw, walker);
  content.append(svg);

  const txt = document.createElement("div");
  txt.className = "tally-text";
  txt.textContent = DATA.tally.text;
  content.append(txt);

  s.append(bg, content);
  transitionTo(s, "fwd");

  // Animate the trail drawing + walker moving along it.
  const L = draw.getTotalLength();
  const DUR = 1500;
  if(RM){
    draw.style.strokeDasharray = "none";
    const end = draw.getPointAtLength(L);
    setWalker(end.x, end.y);
    setTimeout(()=> renderResults("fwd"), DUR);
    return;
  }

  draw.style.strokeDasharray = L;
  draw.style.strokeDashoffset = L;
  const start = performance.now();
  function frame(now){
    const t = Math.min(1,(now-start)/DUR);
    const eased = 1 - Math.pow(1-t,2);   // ease-out
    draw.style.strokeDashoffset = L*(1-eased);
    const p = draw.getPointAtLength(L*eased);
    setWalker(p.x, p.y);
    if(t < 1) requestAnimationFrame(frame);
    else renderResults("fwd");
  }
  requestAnimationFrame(frame);
}

// ---- Scoring ----
function computeResults(){
  const a = state.answers;
  const total = a.reduce((x,y)=> x + (y||0), 0);

  // dimension subscores from the question definitions
  const dims = {};
  DATA.questions.forEach((q,idx)=>{
    dims[q.dimension] = (dims[q.dimension]||0) + (a[idx]||0);
  });

  const persona = DATA.personas.find(p => total >= p.min && total <= p.max)
                || DATA.personas[DATA.personas.length-1];

  // lowest-scoring dimension(s); show up to two on a tie
  const min = Math.min(...Object.values(dims));
  const lowDims = Object.keys(dims).filter(k => dims[k] === min).slice(0,2);

  return { total, dims, persona, lowDims };
}

  const fine = document.createElement("div");

  DATA.finePrint.forEach(t=>{
    const p = document.createElement("p");

  });
  card.append(fine);

  const btn = document.createElement("button");

  btn.onclick = ()=>{ buildRun(); renderLanding("back"); };
  card.append(btn);

  scroll.append(spacer, card);
  s.append(bg, scrim, scroll);

  transitionTo(s, dir || "fwd");

  // one-off leaf-fall burst
  if(!RM) leafBurst();
}

// ---- Confetti / leaf-fall (pure JS, ~1.5s) ----
function leafBurst(){
  const layer = document.getElementById("confetti");
  const colors = ["#57b17d","#2e8b5c","#f4b24a","#ff8a5c","#ff6f61","#1c6b47"];
  const N = 22;
  for(let i=0;i<N;i++){
    const el = document.createElement("div");
    el.className = "leaf";
    const left = Math.random()*100;
    const dur = 1200 + Math.random()*600;
    const delay = Math.random()*300;
    el.style.left = left + "%";
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animation = "fall " + dur + "ms ease-in " + delay + "ms forwards";
    el.style.transform = "translateY(-24px)";
    layer.append(el);
    setTimeout(()=> el.remove(), dur + delay + 60);
  }
}

renderLanding();
